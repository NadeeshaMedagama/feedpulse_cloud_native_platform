name: Publish Container Images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: feedpulse-cloud-native-api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image: feedpulse-cloud-native-auth-service
            dockerfile: services/auth-service/Dockerfile
          - image: feedpulse-cloud-native-feedback-service
            dockerfile: services/feedback-service/Dockerfile
          - image: feedpulse-cloud-native-ai-service
            dockerfile: services/ai-service/Dockerfile
          - image: feedpulse-cloud-native-frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "value=main" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize GHCR owner
        id: ghcr_owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.ghcr_owner.outputs.value }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
            ghcr.io/${{ steps.ghcr_owner.outputs.value }}/${{ matrix.image }}:latest
