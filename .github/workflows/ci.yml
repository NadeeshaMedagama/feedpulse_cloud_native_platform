name: CI Workflow

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Run Go tests
        run: go test ./...

  frontend-test:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/app/**/*.{ts,tsx,js,jsx}', 'frontend/components/**/*.{ts,tsx,js,jsx}', 'frontend/lib/**/*.{ts,tsx,js,jsx}', 'frontend/next.config.mjs', 'frontend/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Run frontend tests
        run: npm test -- --runInBand

      - name: Build frontend
        run: npm run build

  docker-smoke:
    name: Docker build smoke tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image: auth-service
            dockerfile: services/auth-service/Dockerfile
          - image: feedback-service
            dockerfile: services/feedback-service/Dockerfile
          - image: ai-service
            dockerfile: services/ai-service/Dockerfile
          - image: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: feedpulse/${{ matrix.image }}:ci

