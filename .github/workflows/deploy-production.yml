name: Deploy Production Workflow

on:
  workflow_run:
    workflows: ["Publish Container Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags
          TAG="$(git tag --points-at HEAD | head -n1)"
          if [[ -z "$TAG" ]]; then
            echo "No git tag found for this commit. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when commit is not tagged
        if: steps.tag.outputs.skip == 'true'
        run: echo "Deploy skipped because this workflow run is not from a tagged release commit."

      - name: Install kubectl
        if: steps.tag.outputs.skip != 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Set production image tags
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          sed -i "" "s|ghcr.io/your-org/feedpulse-api-gateway:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-api-gateway:${TAG}|g" k8s/base/api-gateway.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-api-gateway:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-api-gateway:${TAG}|g" k8s/base/api-gateway.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-auth-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-auth-service:${TAG}|g" k8s/base/auth-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-auth-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-auth-service:${TAG}|g" k8s/base/auth-service.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-feedback-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-feedback-service:${TAG}|g" k8s/base/feedback-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-feedback-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-feedback-service:${TAG}|g" k8s/base/feedback-service.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-ai-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-ai-service:${TAG}|g" k8s/base/ai-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-ai-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-ai-service:${TAG}|g" k8s/base/ai-service.yaml

      - name: Deploy to production cluster
        if: steps.tag.outputs.skip != 'true'
        run: kubectl apply -k k8s/overlays/atlas

      - name: Check rollout
        if: steps.tag.outputs.skip != 'true'
        run: |
          kubectl -n feedpulse rollout status deployment/api-gateway --timeout=180s
          kubectl -n feedpulse rollout status deployment/auth-service --timeout=180s
          kubectl -n feedpulse rollout status deployment/feedback-service --timeout=180s
          kubectl -n feedpulse rollout status deployment/ai-service --timeout=180s
