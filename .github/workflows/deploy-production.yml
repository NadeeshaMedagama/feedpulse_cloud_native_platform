name: Deploy Production Workflow

on:
  workflow_run:
    workflows: ["Publish Container Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      KUBECONFIG: ${{ runner.temp }}/kubeconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags
          TAG="$(git tag --points-at HEAD | head -n1)"
          if [[ -z "$TAG" ]]; then
            echo "No git tag found for this commit. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when commit is not tagged
        if: steps.tag.outputs.skip == 'true'
        run: echo "Deploy skipped because this workflow run is not from a tagged release commit."

      - name: Install kubectl
        if: steps.tag.outputs.skip != 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          RAW_KUBECONFIG='${{ secrets.KUBE_CONFIG_DATA }}'
          if [[ -z "${RAW_KUBECONFIG// }" ]]; then
            echo "KUBE_CONFIG_DATA secret is empty or missing."
            exit 1
          fi

          KUBECONFIG_PATH="$KUBECONFIG"
          # Accept either base64-encoded kubeconfig (recommended) or raw YAML.
          if echo "$RAW_KUBECONFIG" | base64 --decode > "$KUBECONFIG_PATH" 2>/dev/null; then
            echo "Decoded kubeconfig from base64 secret."
          else
            printf '%s' "$RAW_KUBECONFIG" > "$KUBECONFIG_PATH"
            echo "Using raw kubeconfig content from secret."
          fi

          chmod 600 "$KUBECONFIG_PATH"

          # Fail fast if kubeconfig is malformed or missing required context data.
          kubectl --kubeconfig "$KUBECONFIG_PATH" config current-context >/dev/null

      - name: Verify cluster connectivity
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl --kubeconfig "$KUBECONFIG" config current-context
          SERVER="$(kubectl --kubeconfig "$KUBECONFIG" config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          if [[ -z "$SERVER" || "$SERVER" == *"localhost"* || "$SERVER" == *"127.0.0.1"* ]]; then
            echo "Invalid Kubernetes API server in kubeconfig: $SERVER"
            exit 1
          fi

          kubectl --kubeconfig "$KUBECONFIG" cluster-info

      - name: Set production image tags
        if: steps.tag.outputs.skip != 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          sed -i "" "s|ghcr.io/your-org/feedpulse-api-gateway:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-api-gateway:${TAG}|g" k8s/base/api-gateway.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-api-gateway:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-api-gateway:${TAG}|g" k8s/base/api-gateway.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-auth-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-auth-service:${TAG}|g" k8s/base/auth-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-auth-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-auth-service:${TAG}|g" k8s/base/auth-service.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-feedback-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-feedback-service:${TAG}|g" k8s/base/feedback-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-feedback-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-feedback-service:${TAG}|g" k8s/base/feedback-service.yaml

          sed -i "" "s|ghcr.io/your-org/feedpulse-ai-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-ai-service:${TAG}|g" k8s/base/ai-service.yaml || \
          sed -i "s|ghcr.io/your-org/feedpulse-ai-service:latest|docker.io/${DOCKERHUB_USERNAME}/feedpulse-cloud-native-ai-service:${TAG}|g" k8s/base/ai-service.yaml

      - name: Deploy to production cluster
        if: steps.tag.outputs.skip != 'true'
        run: kubectl --kubeconfig "$KUBECONFIG" apply -k k8s/overlays/atlas

      - name: Check rollout
        if: steps.tag.outputs.skip != 'true'
        run: |
          kubectl --kubeconfig "$KUBECONFIG" -n feedpulse rollout status deployment/api-gateway --timeout=180s
          kubectl --kubeconfig "$KUBECONFIG" -n feedpulse rollout status deployment/auth-service --timeout=180s
          kubectl --kubeconfig "$KUBECONFIG" -n feedpulse rollout status deployment/feedback-service --timeout=180s
          kubectl --kubeconfig "$KUBECONFIG" -n feedpulse rollout status deployment/ai-service --timeout=180s
