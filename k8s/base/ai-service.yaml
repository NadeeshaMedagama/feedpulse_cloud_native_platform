apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: feedpulse
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/your-org/feedpulse-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: AI_SERVICE_PORT
              value: "8083"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: feedpulse-secrets
                  key: GEMINI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: feedpulse
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
  type: ClusterIP

