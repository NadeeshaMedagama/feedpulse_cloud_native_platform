apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: feedpulse
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/feedpulse-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: feedpulse-config
                  key: AUTH_SERVICE_URL
            - name: FEEDBACK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: feedpulse-config
                  key: FEEDBACK_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: feedpulse
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

